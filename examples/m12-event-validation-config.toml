[input]
time_column = "time"
channels = ["switch_v"]
time_unit = "s"
signal_unit = "V"

[[event_transforms]]
id = "switch_state"
type = "schmitt_trigger"
channel = "switch_v"
on_threshold_v = 3.0
off_threshold_v = 2.0
initial_state = "low"

[[event_transforms]]
id = "switch_edges"
type = "edge_extraction"
channel = "switch_v"

[[event_transforms]]
id = "switch_bounce"
type = "bounce_detection"
channel = "switch_v"
window_s = 0.004

[[event_validations]]
id = "must_rise"
type = "missing_pulse"
channel = "switch_v"
direction = "rising"
expected_count = 1

[[event_validations]]
id = "rise_count_limit"
type = "extra_pulse"
channel = "switch_v"
direction = "rising"
max_count = 3

[[event_validations]]
id = "high_dwell"
type = "dwell_time"
channel = "switch_v"
state = "high"
min_duration_s = 0.001

[[event_validations]]
id = "rise_timeout"
type = "timeout"
channel = "switch_v"
direction = "rising"
start_time_s = 0.0
max_time_s = 0.002

[[criteria]]
id = "switch_max"
type = "maximum_voltage"
channel = "switch_v"
threshold_v = 5.5
